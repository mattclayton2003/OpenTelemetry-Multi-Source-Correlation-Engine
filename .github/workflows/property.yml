name: property
on:
  push: { branches: [main] }
  pull_request:
  schedule: [{ cron: "0 5 * * *" }]
permissions:
  contents: read
concurrency:
  group: property-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true
jobs:
  proptest-gate:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PROPTEST_CASES: "64"
      PROPTEST_MAX_SHRINK_ITERS: "256"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `--test properties` selects the proptest *binary*; a bare `properties`
      # is a test-name filter that matches no function (they live inside a
      # proptest!{} block) and silently runs nothing.
      - run: cargo test --workspace --release --test properties

  proptest-nightly:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PROPTEST_CASES: "4096"
      PROPTEST_MAX_SHRINK_ITERS: "8192"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `--test properties` selects the proptest *binary*; a bare `properties`
      # is a test-name filter that matches no function (they live inside a
      # proptest!{} block) and silently runs nothing.
      - run: cargo test --workspace --release --test properties
