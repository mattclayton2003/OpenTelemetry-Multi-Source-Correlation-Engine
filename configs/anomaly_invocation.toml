# Per-failure-class metric to feed into engine's anomaly path.
#
# Latency classes use a p99 derived from the collector's spanmetrics connector
# (duration_milliseconds_bucket, label service_name). `label_replace` copies
# service_name -> service so the engine can select the faulted service (the
# `service` field below) from the per-service result. The same query works for
# any service; the engine filters by `service`.

[dependency_latency]
metric  = 'label_replace(histogram_quantile(0.99, sum by (le, service_name) (rate(duration_milliseconds_bucket[1m]))), "service", "$1", "service_name", "(.+)")'
service = "notifications"
window_pre_sec  = 0
window_post_sec = 120

[dependency_outage]
metric  = "http_requests_total{status=~\"5..\"}"
service = "accounts"
window_pre_sec  = 0
window_post_sec = 120

[db_connection_exhaustion]
metric  = 'label_replace(histogram_quantile(0.99, sum by (le, service_name) (rate(duration_milliseconds_bucket[1m]))), "service", "$1", "service_name", "(.+)")'
service = "accounts"
window_pre_sec  = 0
window_post_sec = 120

[cpu_saturation]
metric  = "container_cpu_usage_seconds_total"
service = "transactions"
window_pre_sec  = 0
window_post_sec = 120

[memory_pressure]
metric  = "container_memory_rss"
service = "notifications"
window_pre_sec  = 0
window_post_sec = 120

[container_restart]
metric  = "up"
service = "auth"
window_pre_sec  = 0
window_post_sec = 120

[network_partition]
metric  = "http_requests_total{status=~\"5..\"}"
service = "accounts"
window_pre_sec  = 0
window_post_sec = 120

[error_rate_spike]
metric  = "http_requests_total{status=~\"5..\"}"
service = "transactions"
window_pre_sec  = 0
window_post_sec = 120

[cold_start]
metric  = 'label_replace(histogram_quantile(0.99, sum by (le, service_name) (rate(duration_milliseconds_bucket[1m]))), "service", "$1", "service_name", "(.+)")'
service = "auth"
window_pre_sec  = 0
window_post_sec = 120
