receivers:
  otlp:
    protocols:
      grpc: { endpoint: 0.0.0.0:4317 }
      http: { endpoint: 0.0.0.0:4318 }

processors:
  batch: {}

connectors:
  # Derive per-service RED metrics (calls + duration histogram) from the spans
  # the collector already receives, so anomaly mode has a real latency signal
  # without instrumenting the services. service.name is included as a dimension
  # by default -> Prometheus label `service_name`.
  spanmetrics:
    histogram:
      explicit:
        buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s]
    metrics_flush_interval: 5s

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls: { insecure: true }
  zipkin:
    endpoint: http://zipkin:9411/api/v2/spans
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls: { insecure: true }

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo, spanmetrics, zipkin]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [loki]
    metrics:
      receivers: [otlp, spanmetrics]
      processors: [batch]
      exporters: [prometheusremotewrite]
