services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      retries: 30

  smtp-fake:
    image: rnwood/smtp4dev:latest
    ports: ["3000:80"]

  auth:
    build: { context: .., dockerfile: crates/services/auth/Dockerfile }
    environment:
      OTLP_ENDPOINT: http://otel-collector:4317
    depends_on: [otel-collector]
    ports: ["8001:8001"]

  accounts:
    build: { context: .., dockerfile: crates/services/accounts/Dockerfile }
    environment:
      OTLP_ENDPOINT: http://otel-collector:4317
      DATABASE_URL: postgres://postgres:postgres@toxiproxy:5433/postgres
    depends_on:
      postgres: { condition: service_healthy }
      otel-collector: { condition: service_started }
    ports: ["8002:8002"]

  transactions:
    build: { context: .., dockerfile: crates/services/transactions/Dockerfile }
    environment:
      OTLP_ENDPOINT: http://otel-collector:4317
      ACCOUNTS_URL: http://accounts:8002
      NOTIFICATIONS_URL: http://notifications:8004
    depends_on: [accounts, notifications]
    ports: ["8003:8003"]

  notifications:
    build: { context: .., dockerfile: crates/services/notifications/Dockerfile }
    environment:
      OTLP_ENDPOINT: http://otel-collector:4317
      SMTP_URL: http://toxiproxy:2525/api/messages
    depends_on: [otel-collector, smtp-fake]
    ports: ["8004:8004"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports: ["4317:4317", "4318:4318"]
    depends_on: [zipkin]

  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml:ro
    ports: ["3200:3200"]

  # Zipkin: a second tracing backend with a built-in distributed-trace UI and
  # service dependency graph. Fed the same spans by the collector (in addition
  # to Tempo) so the cross-service traces can be viewed at http://localhost:9411.
  zipkin:
    image: openzipkin/zipkin:3
    ports: ["9411:9411"]

  loki:
    image: grafana/loki:3.0.0
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki-config.yaml:/etc/loki/config.yaml:ro
    ports: ["3100:3100"]

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - --config.file=/etc/prometheus/config.yaml
      - --web.enable-remote-write-receiver
    volumes:
      - ./prometheus-config.yaml:/etc/prometheus/config.yaml:ro
    ports: ["9090:9090"]

  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.9.0
    command: ["-config=/etc/toxiproxy/proxies.json","-host=0.0.0.0"]
    volumes: ["./toxiproxy/proxies.json:/etc/toxiproxy/proxies.json:ro"]
    ports: ["8474:8474"]

  experiment-runner:
    build: { context: .., dockerfile: crates/experiment-runner/Dockerfile }
    profiles: [research]
    environment:
      OTLP_ENDPOINT: http://otel-collector:4317
      TOXIPROXY_URL: http://toxiproxy:8474
      PROM_URL:      http://prometheus:9090
    volumes:
      - ../experiments:/experiments:ro
      - ../data:/data
    depends_on: [auth, accounts, transactions, notifications, toxiproxy]
    entrypoint: ["/busybox/sh","-c","/busybox/sleep infinity"]

  eval-harness:
    build: { context: .., dockerfile: crates/eval-harness/Dockerfile }
    profiles: [research]
    environment:
      OTLP_ENDPOINT: http://otel-collector:4317
      TEMPO_URL:     http://tempo:3200
      LOKI_URL:      http://loki:3100
      PROM_URL:      http://prometheus:9090
    volumes:
      - ../experiments:/experiments:ro
      - ../configs:/configs:ro
      - ../data:/data
      - ../results:/results
    depends_on: [tempo, loki, prometheus, experiment-runner]
    entrypoint: ["/busybox/sh","-c","/busybox/sleep infinity"]

  correlation-http:
    build: { context: .., dockerfile: crates/correlation-http/Dockerfile }
    profiles: [research]
    environment:
      BIND_ADDR: 0.0.0.0:8500
      TEMPO_URL: http://tempo:3200
      LOKI_URL:  http://loki:3100
      PROM_URL:  http://prometheus:9090
    ports: ["8500:8500"]
    depends_on: [tempo, loki, prometheus]

  # Exposes eval results (eval_runs.db) as Prometheus gauges so the scores live
  # in Grafana alongside the telemetry. Stdlib-only Python; no build.
  eval-exporter:
    image: python:3.12-slim
    profiles: [research]
    volumes:
      - ../data:/data
      - ../scripts/eval_exporter.py:/exporter.py:ro
    command: ["python", "/exporter.py"]
    ports: ["9112:9112"]

  pumba:
    image: gaiaadm/pumba:1.1.7
    profiles: [chaos]
    entrypoint: ["sleep","infinity"]
    volumes: ["/var/run/docker.sock:/var/run/docker.sock"]

  grafana:
    image: grafana/grafana:11.0.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports: ["3001:3000"]
    depends_on: [tempo, loki, prometheus]
